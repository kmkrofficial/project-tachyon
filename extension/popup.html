<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
    }

    .header {
      padding: 15px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      font-size: 11px;
      color: #888;
    }

    .tabs {
      display: flex;
      background: #222;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: #888;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 13px;
    }

    .tab-btn.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
      background: #1a1a1a;
    }

    .tab-content {
      padding: 20px;
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      background: #222;
      border: 1px solid #333;
      color: #fff;
      border-radius: 4px;
      box-sizing: border-box;
    }

    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .connection-banner {
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      border-bottom: 1px solid #333;
    }

    .connection-banner.connected {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }

    .connection-banner.disconnected {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .connection-banner .version {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.7;
    }

    .toggle-row {
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .toggle-row label {
      text-transform: none;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 0;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: 0.3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      transition: 0.3s;
      border-radius: 50%;
    }

    .switch input:checked+.slider {
      background-color: #3b82f6;
    }

    .switch input:checked+.slider:before {
      transform: translateX(18px);
    }

    .separator {
      height: 1px;
      background: #333;
      margin: 12px 20px;
    }

    button#saveBtn {
      width: calc(100% - 40px);
      margin: 0 20px 15px;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    button#saveBtn:hover {
      background: #2563eb;
    }

    button#recheckBtn {
      width: calc(100% - 40px);
      margin: 0 20px 15px;
      padding: 8px;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    button#recheckBtn:hover {
      color: #ccc;
      border-color: #555;
    }

    #statusMsg {
      text-align: center;
      color: #888;
      font-size: 12px;
      padding-bottom: 15px;
      height: 15px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #555;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    .info {
      font-size: 13px;
      color: #aaa;
      margin-top: 0;
    }

    /* ─── Media List ─────────────────────────────────────── */

    .media-section {
      padding: 0 16px;
    }

    .media-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 6px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .media-section-header .count {
      background: #333;
      color: #ccc;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    #mediaList {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    #mediaList::-webkit-scrollbar {
      width: 4px;
    }

    #mediaList::-webkit-scrollbar-track {
      background: transparent;
    }

    #mediaList::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }

    .media-item {
      display: flex;
      align-items: center;
      padding: 8px 0;
      gap: 8px;
      border-bottom: 1px solid #222;
    }

    .media-item:last-child {
      border-bottom: none;
    }

    .media-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .media-icon.video { background: rgba(239, 68, 68, 0.15); }
    .media-icon.stream { background: rgba(34, 197, 94, 0.15); }

    .media-info {
      flex: 1;
      min-width: 0;
    }

    .media-name {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
    }

    .media-meta {
      font-size: 10px;
      color: #666;
      display: flex;
      gap: 6px;
    }

    .media-meta .quality {
      color: #3b82f6;
      font-weight: 600;
    }

    .media-dl-btn {
      width: 26px;
      height: 26px;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .media-dl-btn:hover {
      background: #3b82f6;
      color: white;
    }

    .media-empty {
      text-align: center;
      color: #555;
      font-size: 12px;
      padding: 16px 0;
    }

    #downloadAllBtn {
      width: 100%;
      padding: 8px;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    #downloadAllBtn:hover {
      background: #3b82f6;
      color: white;
    }

    #downloadAllBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="header">
    <h2>TDM Connector</h2>
    <div class="status-row">
      <span id="statusLabel" class="status-label">Checking...</span>
      <div id="statusIcon" class="status-dot"></div>
    </div>
  </div>

  <div id="connectionBanner" class="connection-banner disconnected">
    <span id="connectionText">TDM not detected</span>
    <span id="connectionVersion" class="version"></span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="local">Local</button>
    <button class="tab-btn" data-tab="remote">Remote</button>
  </div>

  <div id="local" class="tab-content active">
    <p class="info">Auto-connects to TDM on this machine. No setup needed.</p>
  </div>

  <div id="remote" class="tab-content">
    <label>Server IP</label>
    <input type="text" id="remoteUrl" placeholder="http://192.168.1.X:4444">

    <label>API Token</label>
    <input type="password" id="apiToken" placeholder="Paste Token from Settings">
  </div>

  <div class="separator"></div>

  <div class="toggle-row">
    <label for="interceptEnabled">Intercept Downloads</label>
    <label class="switch">
      <input type="checkbox" id="interceptEnabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <label for="autoGrab">Video Sniffer</label>
    <label class="switch">
      <input type="checkbox" id="autoGrab">
      <span class="slider"></span>
    </label>
  </div>

  <div class="separator"></div>

  <!-- Captured Media Section -->
  <div class="media-section" id="mediaSection">
    <div class="media-section-header">
      <span>Captured Videos</span>
      <span id="mediaCount" class="count">0</span>
    </div>
    <div id="mediaList">
      <div class="media-empty">No videos detected on this page</div>
    </div>
    <button id="downloadAllBtn" disabled>Download All with TDM</button>
  </div>

  <div class="separator"></div>

  <button id="saveBtn">Save & Connect</button>
  <button id="recheckBtn">Re-check TDM Connection</button>
  <button id="settingsBtn" style="width:calc(100% - 40px);margin:0 20px 15px;padding:8px;background:transparent;color:#888;border:1px solid #333;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s;">Settings</button>
  <div id="statusMsg"></div>

  <script src="popup.js"></script>
</body>

</html>
